<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>El Jardín de Vale</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Cormorant+Garamond:wght@500;700&display=swap" rel="stylesheet">

</head>

<body>

<!-- ===================================================== -->
<!--                 PROYECTO GIRASOL 🌻                    -->
<!--          El Jardín de Vale - Versión 0.5              -->
<!-- ===================================================== -->

<div id="cielo">

    <div id="luna"></div>

    <div id="estrellas"></div>

</div>


<section id="bienvenida">

    <h1 class="titulo">

        🌻 El Jardín de Vale

    </h1>

    <p class="subtitulo">

        Un pequeño rincón para descansar.

    </p>

    <button id="entrar">

        Entrar al jardín

    </button>

</section>


<main id="jardin">

    <section id="sendero">

        <h2>

            Bienvenida 🌙

        </h2>

        <p>

            Espero que este pequeño lugar pueda regalarte unos minutos de tranquilidad.

        </p>

    </section>


    <section id="flores">

        <div class="flor gerbera">

            🌼

            <span>Gerbera</span>

        </div>

        <div class="flor tulipan">

            🌷

            <span>Tulipán</span>

        </div>

        <div class="flor girasol">

            🌻

            <span>Girasol</span>

        </div>

        <div class="flor rosa">

            🖤

            <span>Rosa Negra</span>

        </div>

    </section>

</main>


<script src="script.js"></script>

</body>

</html>
